name: DevSecOps Pipeline - Trivy

# This triggers the pipeline every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull your code into the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6 # Updated to v6 as per their docs
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 2. Build your FastAPI Docker image (just like you did locally)
      - name: Build Docker Image
        run: docker build -t vuln_app:latest .

      # 3. Run Trivy and output the results as a JSON file
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vuln_app:latest'
          format: 'json'
          output: 'trivy-results.json'
          ignore-unfixed: false
          severity: 'LOW,MEDIUM,CRITICAL,HIGH'

      # 5. Inject Pipeline Metadata (CRITICAL STEP)
      - name: Add Pipeline Metadata to Trivy JSON
        run: |
          jq '. + {
            pipeline: {
              run_id: "'$GITHUB_RUN_ID'",
              run_number: "'$GITHUB_RUN_NUMBER'",
              workflow: "'$GITHUB_WORKFLOW'",
              repo: "'$GITHUB_REPOSITORY'",
              branch: "'$GITHUB_REF_NAME'",
              commit_sha: "'$GITHUB_SHA'",
              actor: "'$GITHUB_ACTOR'"
            },
            scan_type: "trivy"
          }' trivy-results.json > final-trivy.json

      # 5. The Magic Handoff: Send the file to your local backend
      - name: Stream Results to Local Backend
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d @final-trivy.json \
          ${{ secrets.BACKEND_URL }}
