name: DevSecOps Pipeline - Trivy

# This triggers the pipeline every time you push to the 'main' branch
on:
  push:
    branches: [ "main", "secure" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Tests with Coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          export DB_PATH=test.db
          rm -f test.db
          pytest --cov=main --cov-report=xml

      - name: Run Scanner
        run: |
          git clone https://github.com/Anirudh436/secrets_scanner.git /tmp/secrets_scanner
          OUTPUT_FILE=$GITHUB_WORKSPACE/output.json \
          python /tmp/secrets_scanner/scanner.py .

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6 # Updated to v6 as per their docs
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
           -Dsonar.projectKey=${{ secrets.sonar_project_key }}
           -Dsonar.buildString=${{ github.run_id }}
           -Dsonar.python.coverage.reportPaths=coverage.xml

      - name: Build Docker Image
        run: docker build -t vuln_app:latest .  

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vuln_app:latest'
          format: 'json'
          output: 'trivy-results.json'
          ignore-unfixed: false
          severity: 'LOW,MEDIUM,CRITICAL,HIGH'

      - name: Add Pipeline Metadata to Trivy JSON
        run: |
          jq \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            '. + {
              pipeline: {
                run_id: $run_id,
                run_number: $run_number,
                workflow: $workflow,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                actor: $actor
              },
              scan_type: "trivy"
            }' trivy-results.json > final-trivy.json

      - name: Combine Results
        run: |
          jq -n \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg branch "$GITHUB_REF_NAME" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --slurpfile trivy final-trivy.json \
            --slurpfile secrets output.json \
            '{
              pipeline: {
                run_id: $run_id,
                run_number: $run_number,
                workflow: $workflow,
                repo: $repo,
                branch: $branch,
                commit_sha: $commit_sha,
                actor: $actor
              },
              scans: {
                trivy: $trivy[0],
                secrets: $secrets[0]
              }
            }' > combined.json

      - name: Send Combined Results
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -d @combined.json \
          ${{ secrets.BACKEND_URL }}


      # - name: Stream Results to Local Backend
      #   run: |
      #     curl -X POST \
      #     -H "Content-Type: application/json" \
      #     -d @final-trivy.json \
      #     ${{ secrets.BACKEND_URL }}
